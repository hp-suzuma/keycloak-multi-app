map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name global.example.com ap.example.com a.example.com b.example.com keycloak.example.com pgadmin.example.com ap-backend.example.com ap-backend-fpm.example.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name global.example.com;

  ssl_certificate /etc/nginx/certs/_wildcard.example.com.pem;
  ssl_certificate_key /etc/nginx/certs/_wildcard.example.com-key.pem;

  location /login {
    proxy_pass http://bff-global:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $remote_addr;
  }

  location /logout {
    proxy_pass http://bff-global:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $remote_addr;
  }

  location /auth/ {
    proxy_pass http://bff-global:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $remote_addr;
  }

  location /ap-api/ {
    proxy_pass http://ap-backend:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Forwarded-Authorization $http_authorization;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $remote_addr;
  }

  location / {
    proxy_pass http://frontend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

server {
  listen 443 ssl http2;
  server_name ap.example.com;

  ssl_certificate /etc/nginx/certs/_wildcard.example.com.pem;
  ssl_certificate_key /etc/nginx/certs/_wildcard.example.com-key.pem;

  location / {
    proxy_pass http://ap-frontend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

server {
  listen 443 ssl http2;
  server_name ap-backend.example.com;

  ssl_certificate /etc/nginx/certs/_wildcard.example.com.pem;
  ssl_certificate_key /etc/nginx/certs/_wildcard.example.com-key.pem;

  location / {
    proxy_pass http://ap-backend:8000;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Forwarded-Authorization $http_authorization;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $remote_addr;
  }
}

server {
  listen 443 ssl http2;
  server_name ap-backend-fpm.example.com;

  ssl_certificate /etc/nginx/certs/_wildcard.example.com.pem;
  ssl_certificate_key /etc/nginx/certs/_wildcard.example.com-key.pem;

  location / {
    include /etc/nginx/fastcgi_params;
    fastcgi_pass ap-backend-fpm:9000;
    fastcgi_param SCRIPT_FILENAME /var/www/app/public/index.php;
    fastcgi_param DOCUMENT_ROOT /var/www/app/public;
    fastcgi_param SCRIPT_NAME /index.php;
    fastcgi_param PATH_INFO "";
    fastcgi_param HTTP_AUTHORIZATION $http_authorization;
    fastcgi_param HTTP_X_FORWARDED_AUTHORIZATION $http_authorization;
    fastcgi_param HTTPS on;
  }
}

