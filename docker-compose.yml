services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      keycloak:
        condition: service_healthy
      pgadmin:
        condition: service_healthy
      bff-global:
        condition: service_healthy
      bff-a:
        condition: service_healthy
      bff-b:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command:
      - start-dev
      - --http-enabled=true
      - --health-enabled=true
      - --proxy=edge
      - --hostname=keycloak.example.com
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
    volumes:
      - ./keycloak/realm-myapp.json:/opt/keycloak/data/import/realm-myapp.json:ro
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc \"exec 3<>/dev/tcp/127.0.0.1/9000; printf 'GET /health/ready HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '200 OK' <&3\"",
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: myapp
      POSTGRES_USER: myapp
      POSTGRES_PASSWORD: myapp123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:8
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_LISTEN_PORT: 80
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1/misc/ping')\" || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
    env_file:
      - ./docker/env/laravel.common.env
      - ./docker/env/backend.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  bff-global:
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
    env_file:
      - ./docker/env/laravel.common.env
      - ./docker/env/bff-global.env
    depends_on:
      backend:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  bff-a:
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
    env_file:
      - ./docker/env/laravel.common.env
      - ./docker/env/bff-a.env
    depends_on:
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  bff-b:
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
    env_file:
      - ./docker/env/laravel.common.env
      - ./docker/env/bff-b.env
    depends_on:
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  ap-frontend:
    build:
      context: .
      dockerfile: docker/ap-frontend/Dockerfile
    working_dir: /app
    volumes:
      - ./ap-server/frontend:/app
      - ap-frontend-node-modules:/app/node_modules
    tty: true
    stdin_open: true
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  ap-frontend-node-modules:
  postgres-data:
  pgadmin-data:
